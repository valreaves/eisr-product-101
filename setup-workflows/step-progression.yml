name: Step progression

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect current step
        id: detect
        run: |
          if [ -f .github/steps/CURRENT_STEP ]; then
            step=$(cat .github/steps/CURRENT_STEP)
          else
            step=1
          fi
          echo "step=$step" >> $GITHUB_OUTPUT

      - name: Grade current step
        id: grade
        run: |
          step=${{ steps.detect.outputs.step }}
          padded=$(printf "%02d" $step)
          module_dir=$(ls -d modules/${padded}-*/ 2>/dev/null | head -1)
          if [ -z "$module_dir" ]; then
            echo "passed=complete" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Modules 1-9: check for [x] in complete.md
          # Module 10: quiz.md with no YOUR ANSWER HERE
          # Module 11: practice.md with no YOUR ANSWER HERE
          if [ -f "${module_dir}complete.md" ]; then
            if grep -q "\[x\]" "${module_dir}complete.md"; then
              echo "passed=true" >> $GITHUB_OUTPUT
            else
              echo "passed=false" >> $GITHUB_OUTPUT
            fi
          elif [ -f "${module_dir}quiz.md" ]; then
            if grep -q "YOUR ANSWER HERE" "${module_dir}quiz.md"; then
              echo "passed=false" >> $GITHUB_OUTPUT
            else
              echo "passed=true" >> $GITHUB_OUTPUT
            fi
          elif [ -f "${module_dir}practice.md" ]; then
            if grep -q "YOUR ANSWER HERE" "${module_dir}practice.md"; then
              echo "passed=false" >> $GITHUB_OUTPUT
            else
              echo "passed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Advance and post next-step issue
        if: steps.grade.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          step=${{ steps.detect.outputs.step }}
          next=$((step + 1))
          echo "$next" > .github/steps/CURRENT_STEP
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/steps/CURRENT_STEP
          git commit -m "Advance to step $next" || true
          git push
          padded=$(printf "%02d" $next)
          next_dir=$(ls -d modules/${padded}-*/ 2>/dev/null | head -1)
          if [ -n "$next_dir" ]; then
            module_name=$(basename $next_dir | sed 's/^[0-9]*-//' | tr '-' ' ')
            title="📘 Step $next: $module_name"
            body="Nice work! Ready for the next module.

👉 **[Start Step $next](../blob/main/${next_dir}README.md)**

When you finish, commit and push — this issue will close automatically."
            gh issue create --title "$title" --body "$body" || true
          else
            gh issue create --title "🎉 Course Complete!" --body "You've finished EISR Product Knowledge 101. Go sell some GitHub! 🚀"
          fi
