name: Step progression

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect current step
        id: detect
        run: |
          if [ -f .github/steps/CURRENT_STEP ]; then
            step=$(cat .github/steps/CURRENT_STEP)
          else
            step=1
          fi
          echo "step=$step" >> $GITHUB_OUTPUT

      - name: Grade current step
        id: grade
        run: |
          step=${{ steps.detect.outputs.step }}
          module_dir=$(ls -d modules/$(printf "%02d" $step)-*/ 2>/dev/null | head -1)
          if [ -z "$module_dir" ]; then
            echo "No module for step $step — course complete!"
            echo "passed=complete" >> $GITHUB_OUTPUT
            exit 0
          fi
          quiz="${module_dir}quiz.md"
          key=".github/steps/$(printf "%02d" $step)-answers.md"
          if [ ! -f "$quiz" ] || [ ! -f "$key" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Simple check: quiz must not still contain "YOUR ANSWER HERE"
          if grep -q "YOUR ANSWER HERE" "$quiz"; then
            echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Advance and post next-step issue
        if: steps.grade.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          step=${{ steps.detect.outputs.step }}
          next=$((step + 1))
          echo "$next" > .github/steps/CURRENT_STEP
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/steps/CURRENT_STEP
          git commit -m "Advance to step $next" || true
          git push
          next_dir=$(ls -d modules/$(printf "%02d" $next)-*/ 2>/dev/null | head -1)
          if [ -n "$next_dir" ]; then
            title="📘 Step $next: $(basename $next_dir | sed 's/^[0-9]*-//' | tr '-' ' ')"
            body="Nice work! You're ready for the next module.\n\n👉 **[Start Step $next]($next_dir/README.md)**\n\nWhen you finish the quiz, commit and push. This issue will close automatically."
            gh issue create --title "$title" --body "$(echo -e $body)" || true
          else
            gh issue create --title "🎉 Course Complete!" --body "You've finished EISR Product Knowledge 101. Go sell some GitHub."
          fi

      - name: Feedback on incomplete quiz
        if: steps.grade.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          step=${{ steps.detect.outputs.step }}
          echo "Step $step quiz still has unanswered questions. Keep going!"
