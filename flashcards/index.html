<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EISR Product Knowledge 101 — Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    color: #c9d1d9; min-height: 100vh; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
  }
  h1 { font-size: 22px; margin-bottom: 6px; color: #58a6ff; text-align: center; }
  .subtitle { font-size: 13px; color: #8b949e; margin-bottom: 20px; text-align: center; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; max-width: 600px; }
  .filter-btn {
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
    padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: #30363d; }
  .filter-btn.active { background: #238636; border-color: #238636; color: white; }
  .card-container { width: 100%; max-width: 600px; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 40px 30px; min-height: 300px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; transition: all 0.2s; user-select: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card:hover { border-color: #58a6ff; }
  .card.flipped { border-color: #238636; background: #0d2818; }
  .card-front { font-size: 20px; font-weight: 600; line-height: 1.5; }
  .card-back { font-size: 18px; line-height: 1.6; color: #7ee787; }
  .hint { font-size: 12px; color: #6e7681; margin-top: 20px; }
  .nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 20px; gap: 10px;
  }
  .nav button {
    flex: 1; background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
    padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: all 0.15s;
  }
  .nav button:hover { background: #30363d; }
  .nav button.primary { background: #238636; border-color: #238636; color: white; }
  .nav button.primary:hover { background: #2ea043; }
  .counter { color: #8b949e; font-size: 13px; text-align: center; padding: 12px 20px; }
  .tag-badge {
    display: inline-block; background: #1f6feb33; color: #58a6ff;
    padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-top: 15px;
  }
  .empty { text-align: center; padding: 40px; color: #8b949e; }
  .footer { margin-top: 30px; font-size: 11px; color: #6e7681; text-align: center; }
  .footer a { color: #58a6ff; }
</style>
</head>
<body>
  <h1>🎴 EISR Product Knowledge 101</h1>
  <p class="subtitle">Tap card to flip · Use filters to study one topic</p>

  <div class="controls" id="filters"></div>

  <div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
      <div id="cardContent" class="card-front">Loading...</div>
    </div>
    <div class="nav">
      <button onclick="prevCard()">← Prev</button>
      <button class="primary" onclick="flipCard()">Flip</button>
      <button onclick="nextCard()">Next →</button>
    </div>
    <div class="counter" id="counter">0 / 0</div>
    <button style="width:100%; background:#21262d; color:#c9d1d9; border:1px solid #30363d; padding:10px; border-radius:8px; cursor:pointer; margin-top:8px;" onclick="shuffle()">🔀 Shuffle</button>
  </div>

  <div class="footer">
    <p>Built by <a href="https://github.com/valreaves">@valreaves</a> · <a href="https://github.com/valreaves/eisr-product-101">Source</a></p>
  </div>

<script>
let allCards = [];
let filteredCards = [];
let currentIdx = 0;
let flipped = false;
let activeTag = 'all';

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const cards = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    const matches = line.match(/^"([^"]*(?:""[^"]*)*)","([^"]*(?:""[^"]*)*)",(.+)$/);
    if (matches) {
      cards.push({
        front: matches[1].replace(/""/g, '"'),
        back: matches[2].replace(/""/g, '"'),
        tag: matches[3].trim()
      });
    }
  }
  return cards;
}

function loadCards() {
  fetch('cards.csv')
    .then(r => r.text())
    .then(text => {
      allCards = parseCSV(text);
      filteredCards = allCards.slice();
      buildFilters();
      renderCard();
    });
}

function buildFilters() {
  const tags = ['all', ...new Set(allCards.map(c => c.tag))];
  const container = document.getElementById('filters');
  container.innerHTML = '';
  tags.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === activeTag ? ' active' : '');
    const count = t === 'all' ? allCards.length : allCards.filter(c => c.tag === t).length;
    btn.textContent = `${t} (${count})`;
    btn.onclick = () => setFilter(t);
    container.appendChild(btn);
  });
}

function setFilter(tag) {
  activeTag = tag;
  filteredCards = tag === 'all' ? allCards.slice() : allCards.filter(c => c.tag === tag);
  currentIdx = 0;
  flipped = false;
  buildFilters();
  renderCard();
}

function renderCard() {
  const content = document.getElementById('cardContent');
  const card = document.getElementById('card');
  const counter = document.getElementById('counter');
  if (!filteredCards.length) {
    content.innerHTML = '<div class="empty">No cards</div>';
    counter.textContent = '0 / 0';
    return;
  }
  const c = filteredCards[currentIdx];
  if (flipped) {
    content.innerHTML = `<div class="card-back">${c.back}</div><span class="tag-badge">${c.tag}</span>`;
    card.classList.add('flipped');
  } else {
    content.innerHTML = `<div class="card-front">${c.front}</div><span class="tag-badge">${c.tag}</span>`;
    card.classList.remove('flipped');
  }
  counter.textContent = `${currentIdx + 1} / ${filteredCards.length}`;
}

function flipCard() { flipped = !flipped; renderCard(); }
function nextCard() {
  currentIdx = (currentIdx + 1) % filteredCards.length;
  flipped = false; renderCard();
}
function prevCard() {
  currentIdx = (currentIdx - 1 + filteredCards.length) % filteredCards.length;
  flipped = false; renderCard();
}
function shuffle() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIdx = 0; flipped = false; renderCard();
}

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
});

loadCards();
</script>
</body>
</html>
